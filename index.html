<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>

        <link rel="stylesheet" href="style.css">

    </head>

    <header>
    </header>

    <body>
        <div id="calculator" class="calculator">
            <div id="calc_wrapper" class="calc-wrapper">
                <div id="result_output" class="result_output">
                0
                </div>

                <div>
                    <button id="btn_op_threezeros" class="btn-calc">000</button>
                    <button id="btn_op_sqrt" class="btn-calc">√x</button>
                    <button id="btn_op_square" class="btn-calc">x²</button>
                    <button id="btn_op_fact" class="btn-calc">x!</button>
                </div>

                <div>
                    <button id="btn_op_backspace" class="btn-calc">←</button>
                    <button id="btn_op_clear" class="btn-calc">C</button>
                    <button id="btn_op_percent" class="btn-calc">%</button>
                    <button id="btn_op_div" class="btn-calc primary">/</button>
                </div>

                <div>
                    <button id="btn_digit_7" class="btn-calc">7</button>
                    <button id="btn_digit_8" class="btn-calc">8</button>
                    <button id="btn_digit_9" class="btn-calc">9</button>
                    <button id="btn_op_mult" class="btn-calc primary">x</button>
                </div>

                <div>
                    <button id="btn_digit_4" class="btn-calc">4</button>
                    <button id="btn_digit_5" class="btn-calc">5</button>
                    <button id="btn_digit_6" class="btn-calc">6</button>
                    <button id="btn_op_minus" class="btn-calc primary">-</button>
                </div>

                <div>
                    <button id="btn_digit_1" class="btn-calc">1</button>
                    <button id="btn_digit_2"class="btn-calc">2</button>
                    <button id="btn_digit_3" class="btn-calc">3</button>
                    <button id="btn_op_plus" class="btn-calc primary">+</button>
                </div>

                <div>
                    <button id="btn_op_sign" class="btn-calc">+/-</button>
                    <button id="btn_digit_0" class="btn-calc">0</button>
                    <button id="btn_digit_dot" class="btn-calc">.</button>
                    <button id="btn_op_equal" class="btn-calc execute">=</button>
                </div>
            </div>
        </div>

    </body>
</html>
